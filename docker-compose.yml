# VSS RT CV PoT Docker Compose Configuration
#
# HOST_IP Configuration:
# Docker Compose does not support shell command substitution.
# If HOST_IP is not set in .env, determine your machine's IP with:
#   ip route get 1.1.1.1 | awk '{print $7; exit}'
# Then add it to your .env file before running docker-compose up

services:
  redis:
    image: redis:8.2.2-alpine
    container_name: vss-redis
    ports:
      - "6379:6379"
      - "4001:4001"
    networks:
      - vss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nvstreamer:
    image: nvcr.io/nvidia/vss-core/vss-vios-nvstreamer:${NVSTREAMER_TAG}
    container_name: vss-nvstreamer
    ports:
      - "30000:30000"
      - "30554-30580:30554-30580"
    environment:
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ${DATA_DIR}/videos:/home/vst/vst_release/streamer_videos
      - ./nvstreamer/configs/adaptor_config.json:/home/vst/vst_release/configs/adaptor_config.json
    networks:
      - vss-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - '0'
              capabilities:
                - gpu
    restart: unless-stopped

  sdr:
    image: nvcr.io/nvidia/vss-core/sdr:${SDR_TAG}
    container_name: vss-sdr
    # SDR assumes a K8s-pod-style deployment with Redis colocated (hardcoded localhost:6379).
    # Share Redis's network namespace so localhost resolves to it; SDR's port 4001 is exposed via the redis service.
    network_mode: "service:redis"
    environment:
      NVSTREAMER_URL: http://nvstreamer:30000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      nvstreamer:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  vss-rt-cv:
    image: nvcr.io/nvidia/vss-core/vss-rt-cv:${PERCEPTION_TAG}
    container_name: vss-rt-cv
    environment:
      HOST_IP: ${HOST_IP}
      NUM_SENSORS: ${NUM_SENSORS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STREAM_URI: ${STREAM_URI:-rtsp://nvstreamer:30554/placeholder}
    volumes:
      - ${DATA_DIR}/models:/data/models
      - ${DATA_DIR}/videos:/data/videos
      - ./deepstream/config:/opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app
      - ./deepstream/init/ds-start.sh:/ds-start.sh
    entrypoint: /ds-start.sh
    depends_on:
      redis:
        condition: service_healthy
      sdr:
        condition: service_started
    networks:
      - vss-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - '0'
              capabilities:
                - gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q metropolis_perception_app"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5m

  backend:
    build: ./backend
    container_name: vss-backend
    ports:
      - "8080:8080"
    environment:
      HOST_IP: ${HOST_IP}
      SDR_URL: http://sdr:4001
      NVSTREAMER_URL: http://nvstreamer:30000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres}
      ENV: ${ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: aims-backend
      VLM_ENABLED: ${VLM_ENABLED:-false}
      VLM_PROVIDER: ${VLM_PROVIDER:-cosmos}
      VLM_TIMEOUT_S: ${VLM_TIMEOUT_S:-120}
      VLM_FRAME_FPS: ${VLM_FRAME_FPS:-1}
      COSMOS_URL: ${COSMOS_URL:-http://cosmos:8000}
      COSMOS_MODEL: ${COSMOS_MODEL:-nvidia/cosmos-reason2-2b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      MEDIAMTX_URL: rtsp://mediamtx:8554
      MEDIAMTX_API_URL: http://mediamtx:9997
      DS_REST_URL: http://vss-rt-cv:9000
      MAX_CONCURRENT_STREAMS: ${MAX_CONCURRENT_STREAMS:-2}
    volumes:
      - ${DATA_DIR}/videos:/data/videos
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      sdr:
        condition: service_started
      mediamtx:
        condition: service_started
      vss-rt-cv:
        condition: service_started
    networks:
      - vss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://kong:8000}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://aims.synch-solutions.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://aims.synch-solutions.com}
    container_name: vss-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_LOG_LEVEL: ${NEXT_PUBLIC_LOG_LEVEL:-INFO}
      NEXT_PUBLIC_LOG_FORMAT: ${NEXT_PUBLIC_LOG_FORMAT:-json}
      NEXT_PUBLIC_SERVICE_NAME: aims-frontend
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://kong:8000}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      BACKEND_URL: http://backend:8080
      SUPABASE_INTERNAL_URL: http://kong:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vss-net
    restart: unless-stopped

  # vLLM serving Cosmos-Reason2-8B from HF weights, FP8-quantized at load.
  # Bypasses the NIM container's GPU-profile lockdown (L4 isn't in any Cosmos
  # NIM manifest, so the NIM startup fails with NIMProfileIDNotFound). vLLM
  # auto-quantizes BF16 -> FP8 on Ada+; backend already talks
  # http://cosmos:8000/v1 (OpenAI-compatible), so no app-side change.
  cosmos:
    profiles: [gpu]
    image: vllm/vllm-openai:v0.7.2
    container_name: aims-cosmos
    # DNS pin: host's /etc/resolv.conf points at the systemd-resolved stub
    # on 127.0.0.53, unreachable inside the container netns. HF fetches fail
    # without an override. AWS VPC resolver (.253) is reliable on EC2.
    dns:
      - 169.254.169.253
      - 8.8.8.8
    ipc: host
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - aims-cosmos-cache:/root/.cache/huggingface
      - ${DATA_DIR}/videos:/data/videos:ro
      - ${DATA_DIR}/incidents:/data/incidents
    networks:
      - vss-net
    command:
      - --model
      - nvidia/Cosmos-Reason2-8B
      - --quantization
      - fp8
      - --gpu-memory-utilization
      - "0.55"
      - --max-model-len
      - "8192"
      - --max-num-seqs
      - "1"
      - --trust-remote-code
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - '0'
              capabilities:
                - gpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10m

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vss-mediamtx
    restart: unless-stopped
    networks: [vss-net]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    # 8554 (RTSP) + 9997 (API) stay internal — backend reaches them by service name.
    # 8888 (HLS) is exposed so the /live preview can pull segments from the browser.
    ports:
      - "8888:8888"

  # ── Mock cameras for the live-demo path ──────────────────────────────────
  # ffmpeg loops a seed clip into mediamtx as a stable RTSP path. The backend
  # /api/monitors endpoint registers/unregisters these with DeepStream so
  # detection runs only when the operator flips the toggle in /live.
  # Always-running publishers are cheap (-c copy, no transcode); the GPU cost
  # is gated by enable/disable.
  mock-camera-1:
    image: jrottenberg/ffmpeg:6-alpine
    container_name: vss-mock-camera-1
    restart: unless-stopped
    networks: [vss-net]
    depends_on: [mediamtx]
    volumes:
      - ${DATA_DIR}/videos:/videos:ro
    command: >
      -re -stream_loop -1 -i /videos/115_and_HVP.mp4
      -c copy -f rtsp rtsp://mediamtx:8554/cam-1

  mock-camera-2:
    image: jrottenberg/ffmpeg:6-alpine
    container_name: vss-mock-camera-2
    restart: unless-stopped
    networks: [vss-net]
    depends_on: [mediamtx]
    volumes:
      - ${DATA_DIR}/videos:/videos:ro
    command: >
      -re -stream_loop -1 -i /videos/75_Thunderbird-2cb8c409-1778627045.mp4
      -c copy -f rtsp rtsp://mediamtx:8554/cam-2

  mock-camera-3:
    image: jrottenberg/ffmpeg:6-alpine
    container_name: vss-mock-camera-3
    restart: unless-stopped
    networks: [vss-net]
    depends_on: [mediamtx]
    volumes:
      - ${DATA_DIR}/videos:/videos:ro
    command: >
      -re -stream_loop -1 -i /videos/91_LPP-1778030969-2cb8c409-1778626853.mp4
      -c copy -f rtsp rtsp://mediamtx:8554/cam-3

networks:
  vss-net:
    driver: bridge

volumes:
  aims-cosmos-cache: {}
