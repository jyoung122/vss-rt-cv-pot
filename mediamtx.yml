# Mediamtx config for the AIMS F2 RTSP shim.
# The backend's rtsp_publisher.py spawns one ffmpeg publisher per upload,
# pushing to rtsp://mediamtx:8554/<video_id>. The HTTP API on :9997 is used
# by the backend to poll for "path is publishing" readiness before telling
# DeepStream to pull (otherwise DS hits 404 in the race window).

api: yes
apiAddress: :9997

# mediamtx v1.18+ ships a restrictive default `any` user that only allows
# publish/read — the HTTP API requires the `api` action explicitly. The
# entire stack runs on the internal vss-net bridge with no host-port
# exposure for mediamtx (compose has no `ports:` block), so we can grant
# the trusted-network user full access without exposing anything publicly.
authInternalUsers:
  - user: any
    pass:
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

paths:
  all_others:
    source: publisher
