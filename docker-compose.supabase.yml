# Trimmed self-hosted Supabase stack (db, auth, meta, studio, kong, storage, imgproxy, minio).
# Omits: rest/PostgREST, realtime, edge-functions, analytics, vector, supavisor.
#
# Usage (overlay on either base compose file):
#   docker compose -f docker-compose.dev.yml   -f docker-compose.supabase.yml up -d
#   docker compose -f docker-compose.yml       -f docker-compose.supabase.yml up -d

services:
  db:
    image: supabase/postgres:15.8.1.060
    container_name: supabase-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    networks:
      - vss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth:
    image: supabase/gotrue:v2.158.1
    container_name: supabase-auth
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: ${GOTRUE_DISABLE_SIGNUP:-true}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      # Auto-confirm so operator accounts can be provisioned without SMTP
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
    networks:
      - vss-net
    restart: unless-stopped

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: supabase-imgproxy
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_AUTO_WEBP:-true}
    volumes:
      - supabase-storage-data:/var/lib/storage:ro
    networks:
      - vss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kong:
    image: kong:2.8.1
    container_name: supabase-kong
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
    # Kong 2.x doesn't natively interpolate env vars in declarative config —
    # expand the template via bash before docker-entrypoint hands off to Kong.
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > /home/kong/kong.yml && /docker-entrypoint.sh kong docker-start'
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./supabase/kong.yml:/home/kong/temp.yml:ro
    networks:
      - vss-net
    restart: unless-stopped

  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: supabase-meta
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - vss-net
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: supabase-minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"
    volumes:
      - supabase-minio-data:/data
    networks:
      - vss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    container_name: supabase-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - vss-net
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb -p local/$${GLOBAL_S3_BUCKET} || true
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      GLOBAL_S3_BUCKET: ${GLOBAL_S3_BUCKET}

  storage:
    image: supabase/storage-api:v1.13.0
    container_name: supabase-storage
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      # Placeholder — we don't run PostgREST; storage-api requires the var but
      # won't call it for our file-upload-only usage pattern.
      POSTGREST_URL: http://meta:8080
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: "5368709120"
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: ${GLOBAL_S3_BUCKET}
      GLOBAL_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT}
      GLOBAL_S3_PROTOCOL: http
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${S3_PROTOCOL_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_PROTOCOL_ACCESS_KEY_SECRET}
      AWS_DEFAULT_REGION: ${REGION}
      TENANT_ID: ${STORAGE_TENANT_ID}
      REGION: ${REGION}
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - vss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  studio:
    image: supabase/studio:2026.04.28-sha-89d08a2
    container_name: supabase-studio
    depends_on:
      db:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: AIMS
      DEFAULT_PROJECT_NAME: AIMS
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SITE_URL:-http://localhost:3000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    networks:
      - vss-net
    restart: unless-stopped

networks:
  vss-net:

volumes:
  supabase-db-data: {}
  supabase-minio-data: {}
  supabase-storage-data: {}
